name: Android build

on:
  push:
    paths:
      - "android/**"
      - "backend/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "backend/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate private backend syntax
        run: python -m py_compile backend/app/main.py

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug and release APKs
        run: |
          chmod +x android/gradlew
          android/gradlew -p android :app:assembleDebug :app:assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: riddle-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: riddle-android-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
