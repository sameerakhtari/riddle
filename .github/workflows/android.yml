name: Product build

on:
  push:
    branches:
      - main
      - development
    paths:
      - "android/**"
      - "backend/**"
      - "docs/**"
      - "README.md"
      - "PRIVACY_POLICY.md"
      - ".github/workflows/android.yml"
  pull_request:
    branches:
      - main
      - development
    paths:
      - "android/**"
      - "backend/**"
      - "docs/**"
      - "README.md"
      - "PRIVACY_POLICY.md"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate private backend syntax
        run: python -m py_compile backend/app/main.py

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Test and build Android app
        shell: bash
        run: |
          chmod +x android/gradlew
          set +e
          android/gradlew -p android \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:assembleRelease \
            --stacktrace > gradle-build.log 2>&1
          result=$?
          set -e
          if [ "$result" -ne 0 ]; then
            echo "Gradle failed; showing the final 240 lines:"
            tail -n 240 gradle-build.log
            exit "$result"
          fi
          tail -n 80 gradle-build.log

      - uses: actions/upload-artifact@v4
        with:
          name: tom-riddle-diary-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: tom-riddle-diary-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
