name: Final Android polish

on:
  push:
    branches:
      - android-v05-quality-memory
    paths:
      - "tools/final_polish.py"
      - ".github/workflows/final-polish.yml"

permissions:
  contents: write

jobs:
  polish-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: android-v05-quality-memory
          fetch-depth: 0

      - name: Record run ID
        run: |
          printf '%s\n' "$GITHUB_RUN_ID" > FINAL_POLISH_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FINAL_POLISH_RUN_ID.txt
          git commit -m "Record final Android polish run [skip ci]"
          git push origin HEAD:android-v05-quality-memory

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply exact source edits
        run: |
          python -m py_compile tools/final_polish.py
          python tools/final_polish.py
          python -m py_compile backend/app/main.py

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug and release APKs
        run: |
          set +e
          chmod +x android/gradlew
          android/gradlew -p android :app:assembleDebug :app:assembleRelease --stacktrace > FINAL_BUILD_OUTPUT.txt 2>&1
          status=$?
          tail -n 500 FINAL_BUILD_OUTPUT.txt
          if [ $status -ne 0 ]; then
            tail -n 700 FINAL_BUILD_OUTPUT.txt > FINAL_BUILD_FAILURE.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add FINAL_BUILD_FAILURE.txt
            git commit -m "Record final Android compiler failure"
            git push origin HEAD:android-v05-quality-memory
            exit $status
          fi
          rm -f FINAL_BUILD_OUTPUT.txt FINAL_BUILD_FAILURE.txt

      - name: Commit final source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/java/com/sameerakhtari/riddle/MainActivity.kt \
                  android/app/src/main/java/com/sameerakhtari/riddle/ui/DiaryCanvasView.kt
          git commit -m "Debounce draft saves and guarantee identity memory replies"
          git push origin HEAD:android-v05-quality-memory

      - uses: actions/upload-artifact@v4
        with:
          name: riddle-android-v05-final-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: riddle-android-v05-final-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
