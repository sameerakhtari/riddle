name: Apply Tom Riddle Diary branding

on:
  push:
    branches:
      - development
    paths:
      - ".github/workflows/product-branding.yml"

permissions:
  contents: write

concurrency:
  group: product-branding-development
  cancel-in-progress: true

jobs:
  brand-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Apply consistent product branding
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          roots = [Path("android"), Path("backend"), Path("PRIVACY_POLICY.md")]
          extensions = {".kt", ".xml", ".md", ".py", ".json", ".yml", ".yaml", ".txt"}
          for root in roots:
              paths = [root] if root.is_file() else list(root.rglob("*"))
              for path in paths:
                  if not path.is_file() or path.suffix.lower() not in extensions:
                      continue
                  try:
                      value = path.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      continue
                  updated = value.replace("Riddle Diary", "Tom Riddle Diary")
                  updated = updated.replace("Riddle diary", "Tom Riddle Diary")
                  if updated != value:
                      path.write_text(updated, encoding="utf-8")

          gradle = Path("android/app/build.gradle.kts")
          value = gradle.read_text(encoding="utf-8")
          value = re.sub(r"versionCode\s*=\s*6\b", "versionCode = 7", value)
          value = re.sub(r'versionName\s*=\s*"0\.5\.0"', 'versionName = "0.5.1"', value)
          gradle.write_text(value, encoding="utf-8")

          privacy = Path("PRIVACY_POLICY.md")
          if privacy.is_file():
              value = privacy.read_text(encoding="utf-8")
              value = re.sub(r"^# .+ Privacy Policy", "# Tom Riddle Diary Privacy Policy", value, count=1, flags=re.M)
              privacy.write_text(value, encoding="utf-8")

          strings = Path("android/app/src/main/res/values/strings.xml").read_text(encoding="utf-8")
          if '<string name="app_name">Tom Riddle Diary</string>' not in strings:
              raise RuntimeError("Android app label was not updated")
          gradle_value = gradle.read_text(encoding="utf-8")
          if 'versionCode = 7' not in gradle_value or 'versionName = "0.5.1"' not in gradle_value:
              raise RuntimeError("Android version bump failed")
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate backend
        run: python -m py_compile backend/app/main.py

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build branded client
        run: |
          chmod +x android/gradlew
          android/gradlew -p android :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Commit branding
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android backend PRIVACY_POLICY.md
          if git diff --cached --quiet; then
            echo "Branding already applied."
            exit 0
          fi
          git commit -m "Brand the app as Tom Riddle Diary"
          git pull --rebase origin development
          git push origin HEAD:development

      - uses: actions/upload-artifact@v4
        with:
          name: tom-riddle-diary-branded-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
