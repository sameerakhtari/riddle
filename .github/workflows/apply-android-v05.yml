name: Apply Android v0.5 quality migration

on:
  push:
    branches:
      - android-v05-quality-memory
    paths:
      - ".migration/**"
      - ".github/workflows/apply-android-v05.yml"

permissions:
  contents: write

jobs:
  migrate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: android-v05-quality-memory
          fetch-depth: 0

      - name: Record migration run ID
        run: |
          printf '%s\n' "$GITHUB_RUN_ID" > ANDROID_MIGRATION_RUN_ID.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ANDROID_MIGRATION_RUN_ID.txt
          git commit -m "Record Android migration run [skip ci]"
          git push origin HEAD:android-v05-quality-memory

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import Android source bundle
        env:
          SOURCE_URL: "https://sdmntpraustraliaeast.oaiusercontent.com/files/00000000-9454-71fa-a9e8-bc190c25561b/raw?se=2026-07-13T15:28:58Z&sp=r&sv=2026-02-06&sr=b&scid=55f9cf8e-f23d-517f-9771-12f02b3388ef&skoid=b7fc319f-b93c-4fac-ba5f-14fdc3f9209f&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-13T01:31:58Z&ske=2026-07-15T01:31:58Z&sks=b&skv=2026-02-06&sig=s5jcYLfxcpe1Dzx5xfiljrjzo0Tbwp3nGCR4/F0USb8%3D"
        run: |
          curl --fail --location --retry 3 --output /tmp/source.zip "$SOURCE_URL"
          mkdir -p /tmp/source-artifact
          unzip -q /tmp/source.zip -d /tmp/source-artifact
          tar -xzf /tmp/source-artifact/riddle-android-source.tar.gz -C .

      - name: Decode and apply Android migration
        run: |
          mkdir -p tools
          cat .migration/chunk* | base64 -d | gzip -d > tools/migrate_v05.py
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/migrate_v05.py')
          text = path.read_text()
          start = text.index('# Preserve the upstream reMarkable source while adding the Android edition maintained in this fork.')
          end = text.index('# Version and fork-local catalog URL.')
          text = text[:start] + '# Android source imported from the private build artifact above.\n\n' + text[end:]
          path.write_text(text)
          PY
          python -m py_compile tools/migrate_v05.py
          python tools/migrate_v05.py
          python - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/java/com/sameerakhtari/riddle/data/AppSettings.kt')
          text = path.read_text()
          start = text.index('    var customInstructions: String')
          end = text.index('\n    var crossSessionMemory:', start)
          block = r'''    var customInstructions: String
              get() = get(KEY_CUSTOM_INSTRUCTIONS, "").take(MAX_CUSTOM_INSTRUCTIONS)
              set(value) = put(KEY_CUSTOM_INSTRUCTIONS, value.replace("\r\n", "\n").trim().take(MAX_CUSTOM_INSTRUCTIONS))
          '''
          path.write_text(text[:start] + block + text[end:])
          PY

      - name: Validate Android XML and backend syntax
        run: |
          python -m py_compile backend/app/main.py
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          for path in Path('android/app/src/main/res').rglob('*.xml'):
              ET.parse(path)
          ET.parse('android/app/src/main/AndroidManifest.xml')
          print('Android XML validation passed')
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Generate Gradle wrapper when absent
        run: gradle -p android wrapper --gradle-version 9.4.1

      - name: Build debug and release APKs
        run: |
          set +e
          chmod +x android/gradlew
          android/gradlew -p android :app:assembleDebug :app:assembleRelease --stacktrace > BUILD_OUTPUT.txt 2>&1
          status=$?
          tail -n 500 BUILD_OUTPUT.txt
          if [ $status -ne 0 ]; then
            tail -n 700 BUILD_OUTPUT.txt > BUILD_FAILURE.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add BUILD_FAILURE.txt
            git commit -m "Record Android v0.5 compiler failure"
            git push origin HEAD:android-v05-quality-memory
            exit $status
          fi
          rm -f BUILD_OUTPUT.txt BUILD_FAILURE.txt

      - name: Remove one-time migration files
        run: rm -rf .migration .source-import .source-import-safe .github/workflows/apply-android-v05.yml tools/migrate_v05.py tools/__pycache__ MIGRATION_FAILURE.txt ANDROID_MIGRATION_RUN_ID.txt BUILD_OUTPUT.txt BUILD_FAILURE.txt

      - name: Commit migrated Android edition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Android v0.5 direct answers, memory, instructions and performance fixes"
          git push origin HEAD:android-v05-quality-memory

      - uses: actions/upload-artifact@v4
        with:
          name: riddle-android-v05-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: riddle-android-v05-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
